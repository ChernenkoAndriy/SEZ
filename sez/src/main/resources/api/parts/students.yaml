paths:
  /students:
    get:
      tags: [ Students ]
      summary: Get list of students for current tutor
      operationId: getStudents
      parameters:
        - name: name
          in: query
          description: Filter by student name or surname
          required: false
          schema:
            type: string
        - name: courseName
          in: query
          description: Filter by course (subject) name
          required: false
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of students retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentResponse'

  /students/{id}:
    get:
      tags: [ Students ]
      summary: Get student by ID
      operationId: getStudentById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Student data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '404':
          description: Student not found

    patch:
      tags: [ Students ]
      summary: Update student profile data
      operationId: updateStudent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentDto'
      responses:
        '200':
          description: Student profile updated successfully
        '404':
          description: Student not found
  /courses/{courseId}/students:
    get:
      tags: [ Students ]
      summary: Get list of students enrolled on the course
      operationId: getStudentsByCourseId
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of students by course retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentResponse'
        '404':
          description: Course not found
components:
  schemas:
    StudentResponse:
      type: object
      required: [ id, email, name, surname, role ]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        surname: { type: string }
        role: { type: string, enum: [ STUDENT ] }

    UpdateStudentDto:
      type: object
      required: [ firstName, lastName ]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
        surname:
          type: string
          minLength: 2
          maxLength: 50
        patronymic:
          type: string
          minLength: 2
          maxLength: 50