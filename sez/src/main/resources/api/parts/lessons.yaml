paths:
  /lessons:
    post:
      tags: [ Lessons ]
      summary: Schedule a new lesson
      operationId: scheduleLesson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLessonDto'
      responses:
        '201':
          description: Lesson scheduled successfully
  /lessons/my:
    get:
      tags: [ Lessons ]
      summary: Get lessons for current user (calendar view)
      operationId: getMyLessons
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          schema:
            type: string
            enum: [ PLANNED, CONDUCTED, NO_SHOW ]
      responses:
        '200':
          description: List of lessons retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LessonResponse'

  /lessons/{id}:
    delete:
      tags: [ Lessons ]
      summary: Delete a lesson by ID
      description: Removes a scheduled lesson from the system.
      operationId: deleteLesson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Lesson deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - only tutors can delete lessons
        '404':
          description: Lesson not found
    patch:
      tags: [ Lessons ]
      summary: Update lesson details (time, status, or meeting link)
      operationId: updateLesson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLessonDto'
      responses:
        '200':
          description: Lesson updated successfully
        '404':
          description: Lesson not found

  /lessons/{id}/details:
    get:
      tags: [ Lessons ]
      summary: Get full lesson details including tutor, student and course info
      operationId: getLessonDetails
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Full lesson details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonDetailsResponse'
        '404':
          description: Lesson not found

components:
  schemas:
    CreateLessonDto:
      type: object
      required: [ enrollmentId, startTime, endTime ]
      properties:
        enrollmentId:
          type: string
          format: uuid
          description: "ID запису на курс (Enrollment)"
        startTime:
          type: string
          format: date-time
          description: "Час початку уроку. Повинен бути у майбутньому."
        endTime:
          type: string
          format: date-time
          description: "Час закінчення уроку. Повинен бути після часу початку."
        price:
          type: number
          minimum: 0
          description: "Ціна за урок. Не може бути від’ємною."
        videoCallUrl:
          type: string
          format: uri
          description: "Посилання на відеодзвінок."

    UpdateLessonDto:
      type: object
      description: "Поля для часткового оновлення уроку. При зміні часу проводиться перевірка на наявність конфліктів у розкладі."
      properties:
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        videoCallUrl:
          type: string
          format: uri
        status:
          $ref: '#/components/schemas/LessonStatus'

    LessonResponse:
      type: object
      required: [ id, startTime, endTime, status ]
      properties:
        id: { type: string, format: uuid }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        status: { $ref: '#/components/schemas/LessonStatus' }
        courseName: { type: string }
        subjectName: { type: string }
        partnerName: { type: string }
        videoCallUrl: { type: string, format: uri }

    LessonStatus:
      type: string
      enum: [ PLANNED, CONDUCTED, NO_SHOW ]

    LessonDetailsResponse:
      type: object
      properties:
        lesson:
          $ref: '#/components/schemas/LessonResponse'
        enrollmentDetails:
          $ref: 'enrollments.yaml#/components/schemas/EnrollmentDetailsResponse'