paths:
  /login:
    post:
      tags: [ Auth ]
      operationId: authenticateUser
      summary: Authentication via email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /forgot-password:
    post:
      tags: [ Auth ]
      operationId: forgotPassword
      summary: Request password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordDto'
      responses:
        '200':
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /reset-password:
    post:
      tags: [ Auth ]
      operationId: resetPassword
      summary: Set new password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordDto'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid or expired token

  /google:
    post:
      tags: [ Auth ]
      operationId: authenticateGoogle
      summary: Authentication via Google ID Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginDto'
      responses:
        '200':
          description: Successful Google authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /complete-registration:
    post:
      tags: [ Auth ]
      operationId: completeRegistration
      summary: Complete profile registration for OAuth users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteRegistrationDto'
      responses:
        '200':
          description: Registration completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /register/tutor:
    post:
      tags: [ Auth ]
      operationId: registerTutor
      summary: Register a new tutor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TutorRegistrationDto'
      responses:
        '201':
          description: Tutor registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /register/student:
    post:
      tags: [ Auth ]
      operationId: registerStudent
      summary: Register a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRegistrationDto'
      responses:
        '201':
          description: Student registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

components:
  schemas:
    LoginDto:
      type: object
      required: [ email, password ]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    GoogleLoginDto:
      type: object
      required: [ idToken ]
      properties:
        idToken: { type: string }

    ForgotPasswordDto:
      type: object
      required: [ email ]
      properties:
        email: { type: string, format: email }

    ResetPasswordDto:
      type: object
      required: [ token, newPassword ]
      properties:
        token: { type: string }
        newPassword: { type: string, minLength: 8, maxLength: 255 }

    CompleteRegistrationDto:
      type: object
      required: [ role, name, surname ]
      properties:
        role:
          type: string
          enum: [ STUDENT, TUTOR ]
        name:
          type: string
          minLength: 2
          maxLength: 50
        surname:
          type: string
          minLength: 2
          maxLength: 50
        bio:
          type: string
          maxLength: 1000

    TutorRegistrationDto:
      type: object
      required: [ email, password, name, surname ]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 255 }
        name: { type: string, minLength: 2, maxLength: 50 }
        surname: { type: string, minLength: 2, maxLength: 50 }
        bio: { type: string, maxLength: 1000 }

    StudentRegistrationDto:
        type: object
        required: [ email, password, name, surname ]
        properties:
          email: { type: string, format: email }
          password: { type: string, minLength: 8, maxLength: 255 }
          name: { type: string, minLength: 2, maxLength: 50 }
          surname: { type: string, minLength: 2, maxLength: 50 }

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        email: { type: string }
        role: { type: string }
        registrationComplete: { type: boolean }

    MessageResponse:
      type: object
      properties:
        message: { type: string }

    ErrorResponse:
      type: object
      properties:
        message: { type: string }
        code: { type: string }