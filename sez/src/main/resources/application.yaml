spring:
  profiles:
    active: dev
  application:
    name: sez
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            scope:
              - email
              - profile